services:
    # open-webui service for LLM interaction
  open-webui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: open-webui
    restart: unless-stopped
    env_file:
      - ../stack.env
    #depends_on:
      #- ollama
    ports:
      - "3001:8080"
    volumes:
      - ${OPENWEBUI_DATA}:/app/backend/data


